{% extends 'base.html' %}
{% block title %}Update Profile | VPN Premium{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="glass-card">
        <h2 style="text-align: center; margin-bottom: 1rem; font-size: 2rem;">Setup <span style="color: var(--primary);">Secure Account</span></h2>
        <p style="text-align: center; color: var(--text-dim); margin-bottom: 2rem;">As a migrated user, please set your email and a permanent password to continue.</p>
        
        {% if error %}
        <div style="background: rgba(218, 54, 51, 0.1); color: var(--danger); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; text-align: center; border: 1px solid var(--danger);">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="grid" style="gap: 1.5rem;">
            {% csrf_token %}
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" required placeholder="yourname@example.com">
            </div>
            
            <div class="form-group">
                <label>New Permanent Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="padding: 1rem; font-size: 1.1rem; margin-top: 1rem;">Update and Access Dashboard</button>
        </form>
    </div>
</div>
{% endblock %}
