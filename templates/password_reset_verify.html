{% extends "base.html" %}
{% load i18n %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 animate-in fade-in zoom-in duration-500">
                <div class="text-center mb-5">
                    <div class="avatar-lg bg-success-soft rounded-circle d-inline-block p-4 mb-4">
                        <i class="fas fa-shield-alt fa-3x text-success"></i>
                    </div>
                    <h2 class="text-white fw-bold">{% trans 'Xác minh OTP' %}</h2>
                    <p class="text-secondary">{% trans 'Vui lòng nhập mã OTP vừa gửi tới email và đặt mật khẩu mới.' %}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label text-gray-400 small text-uppercase">{% trans 'Mã xác minh (OTP)' %}</label>
                        <input type="text" name="otp" class="form-control form-control-lg bg-dark border-secondary text-white text-center letter-spacing-lg" maxlength="6" placeholder="000000" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-gray-400 small text-uppercase">{% trans 'Mật khẩu mới' %}</label>
                        <input type="password" name="password" class="form-control form-control-lg bg-dark border-secondary text-white" placeholder="********" required>
                    </div>

                    <div class="mb-5">
                        <label class="form-label text-gray-400 small text-uppercase">{% trans 'Xác nhận mật khẩu' %}</label>
                        <input type="password" name="confirm_password" class="form-control form-control-lg bg-dark border-secondary text-white" placeholder="********" required>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill fw-bold">{% trans 'ĐẶT LẠI MẬT KHẨU' %}</button>
                        <a href="{% url 'password_reset' %}" class="btn btn-link text-secondary">{% trans 'Gửi lại mã' %}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    .avatar-lg { width: 100px; height: 100px; line-height: 100px; }
    .bg-success-soft { background: rgba(40, 167, 69, 0.1); }
    .letter-spacing-lg { letter-spacing: 0.5rem; font-weight: bold; font-size: 1.5rem; }
</style>
{% endblock %}
