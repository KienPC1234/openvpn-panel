{% extends "admin/change_list.html" %}

{% block content %}
    {{ block.super }}
    
    <div class="mt-8 grid grid-cols-1 md:grid-cols-2 gap-6 border-t border-gray-200 dark:border-gray-800 pt-8">
        <!-- Cleanup Users -->
        <div class="bg-gray-900/10 dark:bg-gray-900/50 p-6 rounded-2xl border border-gray-200 dark:border-gray-800 text-center">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Hệ thống dọn dẹp</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6 italic">Xóa toàn bộ người dùng thường chưa được cấp file .ovpn.</p>
            <form action="{% url 'admin:vpn_cleanup_no_ovpn' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="w-full px-6 py-3 bg-red-600/10 text-red-600 border border-red-600/20 font-bold rounded-xl hover:bg-red-600 hover:text-white transition-all shadow-sm flex items-center justify-center gap-2" onclick="return confirm('Xóa toàn bộ User chưa có File OVPN?')">
                    <i class="fas fa-eraser"></i> XÓA USER CHƯA OVPN
                </button>
            </form>
        </div>

        <!-- Global Firewall Reset -->
        <div class="bg-blue-900/10 dark:bg-blue-900/50 p-6 rounded-2xl border border-blue-200 dark:border-blue-800 text-center">
            <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-2">Reset Tường Lửa</h3>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6 italic">Mở khóa tất cả các IP và dọn dẹp mọi luật chặn (DROP) cũ.</p>
            <form action="{% url 'admin:vpn_global_reset' %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="w-full px-6 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-lg flex items-center justify-center gap-2">
                    <i class="fas fa-sync"></i> RESET & MỞ KHÓA TOÀN BỘ
                </button>
            </form>
        </div>
    </div>
{% endblock %}
