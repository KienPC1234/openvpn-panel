{% extends "admin/base.html" %}
{% load i18n static %}

{% block content %}
<div id="content-main" class="p-8">
    <div class="glass max-w-2xl mx-auto rounded-3xl p-10 border border-white/5 animate-in fade-in zoom-in duration-500">
        <div class="flex items-center gap-6 mb-8">
            <div class="w-20 h-20 bg-primary/10 rounded-2xl flex items-center justify-center border border-primary/20">
                <span class="material-symbols-outlined text-primary text-4xl">lock_reset</span>
            </div>
            <div>
                <h2 class="text-3xl font-bold text-white mb-2">Đổi mật khẩu người dùng</h2>
                <p class="text-gray-400 text-sm">Bạn đang đặt lại mật khẩu cho tài khoản: <span class="text-primary font-bold">{{ target_user.username }}</span></p>
            </div>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-8">
                <label class="block text-gray-400 text-xs font-bold uppercase tracking-wider mb-3">Mật khẩu mới</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-primary transition-colors">
                        <span class="material-symbols-outlined text-xl">key</span>
                    </span>
                    <input type="password" name="password" 
                        class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-12 pr-4 text-white focus:border-primary focus:ring-0 transition-all outline-none" 
                        placeholder="Nhập mật khẩu mới..." required>
                </div>
            </div>

            <div class="flex gap-4">
                <button type="submit" class="flex-1 bg-primary hover:bg-primary-600 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined">save</span>
                    LƯU MẬT KHẨU
                </button>
                <a href="{% url 'admin:vpn_panel_customuser_changelist' %}" class="px-8 bg-white/5 hover:bg-white/10 text-gray-300 font-bold py-4 rounded-2xl transition-all border border-white/10 flex items-center justify-center">
                    HỦY BỎ
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    .glass {
        background: rgba(15, 23, 42, 0.6);
        backdrop-filter: blur(20px);
    }
</style>
{% endblock %}
