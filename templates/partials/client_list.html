<div class="overflow-x-auto">
    <table class="w-full text-left">
        <thead class="bg-slate-800/80 text-gray-400 text-sm uppercase">
            <tr>
                <th class="px-6 py-3">Client Name</th>
                <th class="px-6 py-3">Status</th>
                <th class="px-6 py-3">IP Address</th>
                <th class="px-6 py-3">Created</th>
                <th class="px-6 py-3 text-right">Actions</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-slate-700">
            {% for client in clients %}
            <tr class="hover:bg-slate-800/30 transition">
                <td class="px-6 py-4 font-medium">{{ client.name }}</td>
                <td class="px-6 py-4">
                    {% if client.is_locked %}
                    <span class="px-2 py-1 rounded-full text-xs bg-red-500/20 text-red-400 border border-red-500/50">Locked</span>
                    {% else %}
                    <span class="px-2 py-1 rounded-full text-xs bg-green-500/20 text-green-400 border border-green-500/50">Active</span>
                    {% endif %}
                </td>
                <td class="px-6 py-4 text-gray-400">{{ client.ip_address|default:"---" }}</td>
                <td class="px-6 py-4 text-sm text-gray-400">{{ client.created_at|date:"Y-m-d H:i" }}</td>
                <td class="px-6 py-4 text-right space-x-3">
                    <button hx-post="{% url 'toggle_lock' client.id %}" hx-target="#client-list" class="text-yellow-500 hover:text-yellow-400">
                        <i class="fas {% if client.is_locked %}fa-unlock{% else %}fa-lock{% endif %}"></i>
                    </button>
                    <button hx-delete="{% url 'delete_client' client.id %}" hx-target="#client-list" hx-confirm="Are you sure you want to delete {{ client.name }}?" class="text-red-500 hover:text-red-400">
                        <i class="fas fa-trash"></i>
                    </button>
                    <a href="{% url 'download_ovpn' client.id %}" class="text-blue-500 hover:text-blue-400">
                        <i class="fas fa-download"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" class="px-6 py-12 text-center text-gray-500">No clients found. Add one on the left!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
