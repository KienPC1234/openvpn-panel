{% extends "base.html" %}
{% load i18n %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 animate-in fade-in zoom-in duration-500">
                <div class="text-center mb-5">
                    <div class="avatar-lg bg-primary-soft rounded-circle d-inline-block p-4 mb-4">
                        <i class="fas fa-key fa-3x text-primary"></i>
                    </div>
                    <h2 class="text-white fw-bold">{% trans 'Quên mật khẩu?' %}</h2>
                    <p class="text-secondary">{% trans 'Nhập Email hoặc Tên đăng nhập để nhận mã xác minh OTP.' %}</p>
                </div>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label text-gray-400 small text-uppercase fw-bold">{% trans 'Email / Username' %}</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text bg-dark border-secondary text-secondary"><i class="fas fa-user"></i></span>
                            <input type="text" name="user_input" class="form-control bg-dark border-secondary text-white" placeholder="{% trans 'Địa chỉ email hoặc tên đăng nhập' %}" required>
                        </div>
                    </div>

                    <div class="d-grid gap-3">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">{% trans 'GỬI MÃ XÁC MINH' %}</button>
                        <a href="{% url 'login' %}" class="btn btn-link text-secondary">{% trans 'Quay lại Đăng nhập' %}</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
