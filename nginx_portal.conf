server {
    listen 4553;
    server_name _;

    # All traffic redirected here by iptables will be handled by Django
    # Django will handle captive portal probes (/generate_204, etc.)
    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Disable caching for portal detection
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
    }

    # Static files can still be served by Nginx for performance if needed
    location /static/ {
        alias /data/openvpn/static/;
        expires 1d;
        add_header Cache-Control "public";
    }
}
